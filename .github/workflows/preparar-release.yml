name: Preparar pacote de producao

on:
  push:
    tags:
      - "[0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9]"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Instalar dependencias PHP
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Montar pacote de deploy
        run: |
          rm -rf deploy
          mkdir -p deploy
          rsync -aL \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude 'tests/' \
            --exclude 'resources/' \
            --exclude 'storage/logs/' \
            --exclude 'storage/framework/testing/' \
            ./ deploy/

      - name: Gerar .env de producao
        working-directory: deploy
        run: |
          cp ../.env.example .env
          python3 - <<'PY'
          from pathlib import Path
          import json

          env_path = Path('.env')
          values = {
              'APP_ENV': 'production',
              'APP_DEBUG': 'false',
              'APP_KEY': '${{ secrets.APP_KEY }}',
              'APP_URL': 'https://acervodaigreja.anvy.com.br',
              'DB_CONNECTION': 'mysql',
              'DB_HOST': 'localhost',
              'DB_PORT': '3306',
              'DB_DATABASE': '${{ secrets.DB_DATABASE }}',
              'DB_USERNAME': '${{ secrets.DB_USERNAME }}',
              'DB_PASSWORD': '${{ secrets.DB_PASSWORD }}',
              'ADMIN_NAME': 'Weverton Pereira Andrade',
              'ADMIN_EMAIL': 'wevertonpereiraandrade2005@gmail.com',
              'ADMIN_PASSWORD': '${{ secrets.ADMIN_PASSWORD }}',
              'GOOGLE_DRIVE_CLIENT_ID': '${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}',
              'GOOGLE_DRIVE_CLIENT_SECRET': '${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}',
              'GOOGLE_DRIVE_REDIRECT_URI': '${{ secrets.GOOGLE_DRIVE_REDIRECT_URI }}',
          }

          def format_value(value: str) -> str:
              if value in {'true', 'false', 'null', 'empty'}:
                  return value

              return json.dumps(value, ensure_ascii=False)

          lines = env_path.read_text().splitlines()
          updated = []

          for line in lines:
              if '=' not in line or line.lstrip().startswith('#'):
                  updated.append(line)
                  continue

              key, _ = line.split('=', 1)
              if key in values:
                  updated.append(f'{key}={format_value(values[key])}')
              else:
                  updated.append(line)

          env_path.write_text('\n'.join(updated) + '\n')
          PY

      - name: Enviar pacote como artefato
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            deploy/**
            !deploy/**/.*
            deploy/.env
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
