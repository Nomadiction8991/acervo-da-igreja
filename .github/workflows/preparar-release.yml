name: Preparar pacote de producao

on:
  push:
    tags:
      - "[0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9][0-9]"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detectar mudancas relevantes
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "php_changed=true" >> "$GITHUB_OUTPUT"
            echo "js_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
            echo "php_changed=true" >> "$GITHUB_OUTPUT"
            echo "js_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"

          php_changed=false
          js_changed=false

          if echo "$changed_files" | grep -Eq '^(app/|bootstrap/|config/|database/|routes/|resources/views/|resources/css/|resources/js/|composer\.json|composer\.lock|phpunit\.xml|phpstan\.neon|artisan|app/Console/|app/Http/|app/Models/|app/Services/|app/Observers/|app/Policies/)'; then
            php_changed=true
          fi

          if echo "$changed_files" | grep -Eq '^(resources/css/|resources/js/|package\.json|package-lock\.json|vite\.config\.js|tailwind\.config\.js|postcss\.config\.js)'; then
            js_changed=true
          fi

          echo "php_changed=$php_changed" >> "$GITHUB_OUTPUT"
          echo "js_changed=$js_changed" >> "$GITHUB_OUTPUT"

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Cache vendor
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Instalar dependencias PHP
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar dependencias JS
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache build frontend
        id: cache-build
        uses: actions/cache@v4
        with:
          path: public/build
          key: build-${{ runner.os }}-${{ hashFiles('resources/css/**', 'resources/js/**', 'package-lock.json', 'vite.config.js', 'tailwind.config.js', 'postcss.config.js') }}

      - name: Build dos assets
        if: steps.changes.outputs.js_changed == 'true' || steps.cache-build.outputs.cache-hit != 'true'
        run: npm run build

      - name: Montar pacote de deploy
        run: |
          rm -rf deploy
          mkdir -p deploy
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude 'tests/' \
            --exclude 'node_modules/' \
            --exclude 'resources/' \
            --exclude 'storage/logs/' \
            --exclude 'storage/framework/testing/' \
            --exclude 'public/build/' \
            ./ deploy/
          mkdir -p deploy/public/build
          cp -a public/build/. deploy/public/build/

      - name: Gerar .env de producao
        working-directory: deploy
        run: |
          cp ../.env.example .env
          python3 - <<'PY'
          from pathlib import Path

          env_path = Path('.env')
          values = {
              'APP_ENV': 'production',
              'APP_DEBUG': 'false',
              'APP_KEY': '${{ secrets.APP_KEY }}',
              'APP_URL': 'https://acervodaigreja.anvy.com.br',
              'DB_CONNECTION': 'mysql',
              'DB_HOST': 'localhost',
              'DB_PORT': '3306',
              'DB_DATABASE': '${{ secrets.DB_DATABASE }}',
              'DB_USERNAME': '${{ secrets.DB_USERNAME }}',
              'DB_PASSWORD': '${{ secrets.DB_PASSWORD }}',
              'ADMIN_NAME': 'Weverton Pereira Andrade',
              'ADMIN_EMAIL': 'wevertonpereiraandrade2005@gmail.com',
              'ADMIN_PASSWORD': '${{ secrets.ADMIN_PASSWORD }}',
              'GOOGLE_DRIVE_CLIENT_ID': '${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}',
              'GOOGLE_DRIVE_CLIENT_SECRET': '${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}',
              'GOOGLE_DRIVE_REDIRECT_URI': '${{ secrets.GOOGLE_DRIVE_REDIRECT_URI }}',
          }

          lines = env_path.read_text().splitlines()
          updated = []

          for line in lines:
              if '=' not in line or line.lstrip().startswith('#'):
                  updated.append(line)
                  continue

              key, _ = line.split('=', 1)
              if key in values:
                  updated.append(f'{key}={values[key]}')
              else:
                  updated.append(line)

          env_path.write_text('\n'.join(updated) + '\n')
          PY

      - name: Enviar pacote como artefato
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: deploy
          if-no-files-found: error
          retention-days: 1
